services:
  webserver:
    container_name: nginx
    image: nginx:1.26-alpine
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./public:/var/www/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - php
      - database
    networks:
      - lemp-network

  php:
    container_name: php
    build:
      context: .
      dockerfile: Dockerfile-php
    restart: unless-stopped
    volumes:
      - ./public:/var/www/html
      - ./php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      DB_HOST: database
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-spacerunner}
      DB_USER: ${DB_USER:-spacerunner}
      DB_PASSWORD: ${DB_PASSWORD:-spacerunner}
    depends_on:
      - database
    networks:
      - lemp-network

  database:
    container_name: mariadb
    image: mariadb:11.4
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-spacerunner}
      MYSQL_DATABASE: ${DB_NAME:-spacerunner}
      MYSQL_USER: ${DB_USER:-spacerunner}
      MYSQL_PASSWORD: ${DB_PASSWORD:-spacerunner}
    networks:
      - lemp-network

networks:
  lemp-network:
    driver: bridge

volumes:
  db-data:

